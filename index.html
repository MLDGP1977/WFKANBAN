<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão de Estoque Kanban</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 1); }
        @media (max-width: 640px) { .btn-mobile { width: 100%; justify-content: center; padding: 12px; } }
        .checkbox-custom { width: 28px; height: 28px; border-radius: 8px; cursor: pointer; border: 2px solid #cbd5e1; appearance: none; display: flex; align-items: center; justify-content: center; transition: all 0.2s; background: white; }
        .checkbox-custom:checked { background-color: #3b82f6; border-color: #3b82f6; }
        .checkbox-custom:checked::after { content: '✓'; color: white; font-size: 18px; font-weight: bold; }
        
        .shelf-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .bin { 
            aspect-ratio: 1; 
            border-radius: 6px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-size: 10px; 
            font-weight: 800; 
            transition: all 0.3s; 
            border: 1px solid #e2e8f0; 
            background: #fff; 
            color: #cbd5e1; 
            overflow: hidden; 
            padding: 2px; 
            text-align: center; 
            line-height: 1.2; 
        }
        .bin.active { 
            background-color: #3b82f6; 
            color: white; 
            border-color: #1d4ed8; 
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.7); 
            z-index: 10; 
            transform: scale(1.05);
        }
        .bin .bin-pos { 
            font-size: 8px; 
            font-weight: 900;
            opacity: 0.9; 
            margin-top: 2px;
            background: rgba(0,0,0,0.1);
            padding: 1px 3px;
            border-radius: 3px;
        }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
        .logo-container img { max-height: 50px; width: auto; object-fit: contain; }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-custom { animation: spin 1s linear infinite; }

        /* Estilo para o botão de voz pulsando */
        .voice-active { color: #ef4444 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="p-2 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Cabeçalho -->
        <header class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex items-center gap-4">
                <div class="logo-container">
                    <img src="https://mldgp1977.github.io/WFKANBAN/Logo.png" alt="Logo" onerror="this.src='https://placehold.co/150x50?text=LOGO'">
                </div>
                <div class="border-l border-slate-200 pl-4">
                    <h1 class="text-xl md:text-2xl font-bold text-slate-800 leading-tight">Controle de Estoque</h1>
                    <p class="text-blue-600 font-semibold text-xs md:text-sm">Painel Kanban de Produção</p>
                </div>
            </div>
            <div class="flex flex-col sm:flex-row gap-2">
                <input type="file" id="fileInput" accept=".csv, .xlsx, .xls" class="hidden">
                <button onclick="document.getElementById('fileInput').click()" class="btn-mobile bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-xl font-semibold transition flex items-center gap-2 shadow-md active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Importar Planilha
                </button>
                <button onclick="deleteDataPrompt()" class="btn-mobile bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2.5 rounded-xl font-semibold transition flex items-center gap-2 active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    Limpar Tudo
                </button>
            </div>
        </header>

        <!-- Filtros e Status -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-6">
            <div class="glass-card p-4 md:p-6 rounded-2xl shadow-sm lg:col-span-3">
                <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wider">Ordem de Serviço</label>
                <div class="flex flex-col sm:flex-row gap-3">
                    <div class="relative flex-1">
                        <select id="osSelect" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-4 pr-24 py-3 text-lg font-bold text-slate-700 focus:ring-4 focus:ring-blue-100 focus:outline-none transition appearance-none cursor-pointer">
                            <option value="">Conectando à nuvem...</option>
                        </select>
                        <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center gap-1">
                            <!-- Botão de Voz -->
                            <button id="voiceBtn" onclick="startVoiceRecognition()" class="p-2 text-slate-400 hover:text-blue-600 transition-colors" title="Ditar OS">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
                            </button>
                            <button id="clearOSBtn" onclick="clearOSSelection()" class="p-2 text-slate-400 hover:text-red-500 transition-colors hidden" title="Limpar Seleção">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                        </div>
                    </div>
                    <button id="refreshBtn" onclick="refreshData()" class="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold transition hover:bg-black active:scale-95 flex items-center justify-center gap-2 min-w-[140px]">
                        <svg id="refreshIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                        Atualizar
                    </button>
                </div>
            </div>
            <div class="glass-card p-4 md:p-6 rounded-2xl shadow-sm flex flex-col justify-center items-center text-center">
                <span class="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Status Sistema</span>
                <div id="apiStatusContainer" class="flex items-center gap-2 text-slate-400 font-bold">
                    <div id="apiIndicator" class="w-3 h-3 bg-slate-300 rounded-full"></div> 
                    <span id="apiText" class="text-xs uppercase">Iniciando</span>
                </div>
            </div>
        </div>

        <!-- Navegação de Abas -->
        <div class="flex border-b border-slate-200 mb-6 px-2 gap-8">
            <button onclick="switchTab('cards')" id="tab-cards" class="pb-3 text-sm font-bold uppercase tracking-widest tab-active transition-all">Cards Kanban</button>
            <button onclick="switchTab('map')" id="tab-map" class="pb-3 text-sm font-bold uppercase tracking-widest text-slate-400 transition-all">Mapa de Prateleiras</button>
        </div>

        <!-- Conteúdo: Cards -->
        <div id="view-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20">
            <div class="col-span-full py-20 text-center text-slate-400 font-bold">Aguardando seleção de OS...</div>
        </div>

        <!-- Conteúdo: Mapa -->
        <div id="view-map" class="hidden pb-20">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="shelvesContainer">
                <!-- Prateleiras geradas dinamicamente -->
            </div>
        </div>
    </div>

    <!-- Modal de Confirmação -->
    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl scale-100 transition-all">
            <h2 id="modalTitle" class="text-2xl font-bold text-slate-800 mb-2">Ação</h2>
            <p id="modalContent" class="mb-8 text-slate-500 font-medium leading-relaxed"></p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeModal()" class="px-4 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold active:scale-95 transition">Voltar</button>
                <button id="modalConfirmBtn" class="px-4 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-100 active:scale-95 transition">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzWcjZ8QJEXMa89aW4hdSXlqpYjb19GT1VDxQCbaEP5iS7V1svrWbf7n2dw7OpeiXXmYg/exec";
        let rawData = [];
        let currentOS = "";

        window.onload = () => { 
            fetchInitialData(); 
            setupFileListeners();
            generateEmptyMap();
        };

        // --- FUNÇÕES DE RECONHECIMENTO DE VOZ ---
        function startVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Seu navegador não suporta reconhecimento de voz.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            const voiceBtn = document.getElementById('voiceBtn');
            voiceBtn.classList.add('voice-active');
            setApiStatus('loading', 'OUVINDO...');

            recognition.start();

            recognition.onresult = (event) => {
                let speechResult = event.results[0][0].transcript;
                // Limpa o texto para tentar extrair apenas números
                let osNumber = speechResult.replace(/\D/g, '');
                
                if (osNumber) {
                    const select = document.getElementById('osSelect');
                    // Tenta encontrar o valor no select
                    let found = false;
                    for (let i = 0; i < select.options.length; i++) {
                        if (select.options[i].value === osNumber) {
                            select.selectedIndex = i;
                            handleOSSelection(osNumber);
                            found = true;
                            break;
                        }
                    }
                    if (!found) {
                        setApiStatus('error', `OS ${osNumber} NÃO ENCONTRADA`);
                        setTimeout(() => setApiStatus('success'), 3000);
                    }
                } else {
                    setApiStatus('error', 'NÃO ENTENDI');
                    setTimeout(() => setApiStatus('success'), 2000);
                }
            };

            recognition.onspeechend = () => {
                recognition.stop();
                voiceBtn.classList.remove('voice-active');
            };

            recognition.onerror = (event) => {
                voiceBtn.classList.remove('voice-active');
                setApiStatus('error', 'ERRO NO MICROFONE');
                setTimeout(() => setApiStatus('success'), 2000);
            };
        }

        function switchTab(view) {
            document.getElementById('view-cards').classList.toggle('hidden', view !== 'cards');
            document.getElementById('view-map').classList.toggle('hidden', view !== 'map');
            document.getElementById('tab-cards').className = view === 'cards' ? 'pb-3 text-sm font-bold uppercase tracking-widest tab-active' : 'pb-3 text-sm font-bold uppercase tracking-widest text-slate-400';
            document.getElementById('tab-map').className = view === 'map' ? 'pb-3 text-sm font-bold uppercase tracking-widest text-slate-400' : 'pb-3 text-sm font-bold uppercase tracking-widest tab-active';
        }

        function setApiStatus(status, label = "") {
            const indicator = document.getElementById('apiIndicator');
            const text = document.getElementById('apiText');
            indicator.className = "w-3 h-3 rounded-full " + (status === 'loading' ? 'bg-blue-500 animate-pulse' : status === 'success' ? 'bg-green-500' : 'bg-red-500');
            text.textContent = label || (status === 'loading' ? 'CARREGANDO' : status === 'success' ? 'ONLINE' : 'OFFLINE');
        }

        async function clearOSSelection() {
            const select = document.getElementById('osSelect');
            select.value = "";
            setApiStatus('loading', 'LIMPANDO NUVEM...');
            await handleOSSelection("");
            setApiStatus('success', 'NUVEM LIMPA');
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            icon.classList.add('animate-spin-custom');
            
            await fetchInitialData();
            if (currentOS) handleOSSelection(currentOS);

            setTimeout(() => {
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                icon.classList.remove('animate-spin-custom');
            }, 500);
        }

        async function fetchInitialData() {
            setApiStatus('loading');
            try {
                const response = await fetch(`${API_URL}?action=getImportData&t=${Date.now()}`);
                const data = await response.json();
                rawData = data.map(item => ({
                    ...item,
                    os: String(item.os).trim(),
                    ecod: String(item.ecod).trim(),
                    local: String(item.local || "").toUpperCase().trim()
                }));
                populateOSSelect(rawData);
                setApiStatus('success');
            } catch (e) { setApiStatus('error', 'ERRO CONEXÃO'); }
        }

        function populateOSSelect(data) {
            const select = document.getElementById('osSelect');
            const savedValue = select.value;
            const uniqueOS = [...new Set(data.map(item => item.os))].filter(os => os && os !== "undefined" && os !== "");
            
            select.innerHTML = '<option value="">Selecione uma O.S.</option>';
            uniqueOS.sort((a, b) => isNaN(a) || isNaN(b) ? a.localeCompare(b) : Number(a) - Number(b));

            uniqueOS.forEach(os => {
                const opt = document.createElement('option');
                opt.value = os;
                opt.textContent = `OS${os}`; 
                if (os === savedValue) opt.selected = true;
                select.appendChild(opt);
            });
            
            select.onchange = (e) => handleOSSelection(e.target.value);
            updateClearBtnVisibility(select.value);
        }

        function updateClearBtnVisibility(value) {
            const clearBtn = document.getElementById('clearOSBtn');
            if (value) clearBtn.classList.remove('hidden');
            else clearBtn.classList.add('hidden');
        }

        async function handleOSSelection(os) {
            currentOS = os;
            const board = document.getElementById('view-cards');
            updateClearBtnVisibility(os);
            
            if (!os) {
                board.innerHTML = '<div class="col-span-full py-20 text-center text-slate-400 font-bold">Aguardando seleção de OS...</div>';
                resetMap();
                await sendPost({ action: 'syncApp', data: [] });
                return;
            }
            
            const filtered = rawData.filter(item => item.os === os);
            renderKanban(filtered);
            updateMap(filtered);
            await sendPost({ action: 'syncApp', data: filtered });
        }

        function renderKanban(items) {
            const board = document.getElementById('view-cards');
            board.innerHTML = '';
            if(items.length === 0) {
                board.innerHTML = '<div class="col-span-full py-20 text-center text-slate-300 font-bold uppercase tracking-widest">Nenhum item pendente</div>';
                return;
            }
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = "glass-card p-6 rounded-[2rem] shadow-sm border-l-[12px] border-l-blue-500 hover:shadow-xl transition-all duration-300";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full tracking-wider">CÓD: ${item.ecod}</span>
                            <h3 class="font-bold text-slate-800 text-lg mt-3 leading-tight">${item.descricao}</h3>
                        </div>
                        <div class="ml-4 flex flex-col items-center">
                            <label class="text-[9px] font-black text-slate-400 uppercase mb-1">Retirado</label>
                            <input type="checkbox" class="checkbox-custom shadow-sm" onclick="handleRetirado(this, '${item.os}', '${item.ecod}', '${item.descricao}')">
                        </div>
                    </div>
                    <div class="flex items-center gap-2 mb-6">
                        <div class="w-2.5 h-2.5 rounded-full ${item.local === 'NÃO LOCALIZADO' ? 'bg-red-500' : 'bg-emerald-500'}"></div>
                        <span class="text-xs font-bold uppercase tracking-tighter ${item.local === 'NÃO LOCALIZADO' ? 'text-red-500' : 'text-slate-400'}">${item.local || 'SEM LOCAL'}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                            <div class="text-[10px] text-blue-400 font-black uppercase mb-1">Pedido OS</div>
                            <div class="font-black text-blue-700 text-2xl">${item.qtd}</div>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-200">
                            <div class="text-[10px] text-slate-400 font-black uppercase mb-1">Estoque Total</div>
                            <div class="font-black text-slate-700 text-2xl">${item.totalEstoque}</div>
                        </div>
                    </div>
                `;
                board.appendChild(card);
            });
        }

        function generateEmptyMap() {
            const container = document.getElementById('shelvesContainer');
            container.innerHTML = '';
            const rows = ['A','B','C','D','E','F','G','H','I','J','K','L'];
            for(let p = 1; p <= 6; p++) {
                const shelf = document.createElement('div');
                shelf.className = "bg-white p-4 rounded-3xl border border-slate-100 shadow-sm";
                shelf.innerHTML = `<h4 class="text-center font-black text-slate-400 mb-4 uppercase tracking-widest text-[10px]">Prateleira P${p}</h4>`;
                const grid = document.createElement('div');
                grid.className = "shelf-grid";
                rows.forEach(rowLetter => {
                    for(let col = 1; col <= 5; col++) {
                        const cellId = `P${p}-${rowLetter}${col}`;
                        const bin = document.createElement('div');
                        bin.id = cellId;
                        bin.className = "bin";
                        bin.innerHTML = `<span>${rowLetter}${col}</span>`;
                        grid.appendChild(bin);
                    }
                });
                shelf.appendChild(grid);
                container.appendChild(shelf);
            }
        }

        function resetMap() {
            document.querySelectorAll('.bin').forEach(b => {
                b.classList.remove('active');
                const parts = b.id.split('-');
                if (parts.length > 1) b.innerHTML = `<span>${parts[1]}</span>`;
                b.title = "";
            });
        }

        function updateMap(activeItems) {
            resetMap();
            activeItems.forEach(item => {
                let loc = (item.local || "").toUpperCase().trim();
                if(!loc || loc === "NÃO LOCALIZADO") return;
                const normalizedId = loc.replace(/\s+/g, '-').replace(/([P]\d)([A-L])/, '$1-$2');
                const displayLoc = loc.replace('-', ' ');
                const targetBin = document.getElementById(normalizedId);
                if(targetBin) {
                    targetBin.classList.add('active');
                    targetBin.innerHTML = `<span class="text-[9px] md:text-[10px] font-black truncate w-full">${item.ecod}</span><span class="bin-pos">${displayLoc}</span>`;
                    targetBin.title = `${item.ecod} em ${displayLoc}: ${item.descricao}`;
                }
            });
        }

        async function handleRetirado(checkbox, os, ecod, descricao) {
            if (!checkbox.checked) return;
            openModal("Baixa de Material", `Confirmar a saída do item ${ecod}? Ele será removido definitivamente do controle.`, async () => {
                const card = checkbox.closest('.glass-card');
                card.style.opacity = "0.3";
                setApiStatus('loading', 'PROCESSANDO...');
                const ok = await sendPost({ action: 'removeItem', os, ecod, descricao });
                if (ok) {
                    card.remove();
                    rawData = rawData.filter(i => !(i.os === os && i.ecod === ecod && i.descricao === descricao));
                    updateMap(rawData.filter(i => i.os === os));
                    setApiStatus('success', 'ITEM REMOVIDO');
                } else {
                    checkbox.checked = false;
                    card.style.opacity = "1";
                    setApiStatus('error', 'FALHA');
                }
            }, () => { checkbox.checked = false; });
        }

        function setupFileListeners() {
            document.getElementById('fileInput').onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const data = new Uint8Array(ev.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(sheet);
                    const mapped = jsonData.map(row => [
                        row["Dt. Recebto"] || "", String(row["Nº OS"] || "").trim(), "", "", 
                        row["Qtde Total LM"] || 0, String(row["Código LM"] || "").trim(), "", "", 
                        row["Descrição LM"] || "", "", row["Qtde OS"] || 0
                    ]).filter(r => r[1] && r[1] !== "Nº OS");
                    setApiStatus('loading', 'IMPORTANDO...');
                    const ok = await sendPost({ action: 'importCSV', payload: mapped });
                    if (ok) { setApiStatus('success', 'CONCLUÍDO'); setTimeout(refreshData, 1000); }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = "";
            };
        }

        async function sendPost(payload) {
            try { 
                await fetch(API_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(payload) 
                }); 
                return true; 
            } catch (e) { 
                return false; 
            }
        }

        function openModal(t, c, cb, onCancel) {
            document.getElementById('modalTitle').textContent = t;
            document.getElementById('modalContent').textContent = c;
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.getElementById('modalConfirmBtn').onclick = () => { cb(); closeModal(); };
            window.currentCancel = onCancel;
        }

        function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); if(window.currentCancel) window.currentCancel(); window.currentCancel = null; }

        function deleteDataPrompt() { 
            openModal("Limpar Tudo", "Isso apagará permanentemente todos os registros das abas Importação e APP. Deseja continuar?", async () => { 
                setApiStatus('loading', 'LIMPANDO NUVEM...');
                await sendPost({action:'deleteImport'});
                await sendPost({action:'clearApp'}); 
                setApiStatus('success', 'BANCO LIMPO');
                setTimeout(() => refreshData(), 1000);
            }); 
        }
    </script>
</body>
</html>
